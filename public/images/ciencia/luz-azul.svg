<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#F9F9F9"/>
  
  <!-- Digital Wave -->
  <path d="M50 300C150 100 250 500 350 300" stroke="#007AFF" stroke-width="8"/>
  <text x="50" y="100" font-family="monospace" font-size="20" font-weight="bold" fill="#007AFF">PICO AZUL ARTIFICIAL (450nm)</text>
  
  <!-- Natural Spectrum Background -->
  <rect x="450" y="150" width="300" height="300" fill="white" stroke="#111111" stroke-width="2"/>
  <linearGradient id="naturalGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FF3B30"/>
    <stop offset="20%" stop-color="#FF9500"/>
    <stop offset="40%" stop-color="#FFCC00"/>
    <stop offset="60%" stop-color="#34C759"/>
    <stop offset="80%" stop-color="#007AFF"/>
    <stop offset="100%" stop-color="#AF52DE"/>
  </linearGradient>
  <rect x="470" y="170" width="260" height="260" fill="url(#naturalGrad)" opacity="0.3"/>
  <text x="470" y="140" font-family="monospace" font-size="20" font-weight="bold">ESPECTRO NATURAL EQUILIBRADO</text>
  
  <line x1="400" y1="100" x2="400" y2="500" stroke="#111111" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="360" y="550" font-family="monospace" font-size="16">VS</text>
</svg>
