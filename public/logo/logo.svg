<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Sun mark icon -->
  <g transform="translate(4, 4)">
    <!-- Outer circle -->
    <circle cx="36" cy="36" r="33" stroke="#C47C5A" stroke-width="1.2" fill="none"/>
    <!-- Top dot -->
    <circle cx="36" cy="1.5" r="1.5" fill="#C47C5A"/>
    <!-- Bottom dot -->
    <circle cx="36" cy="70.5" r="1.5" fill="#C47C5A"/>
    <!-- Sun rays (top half) -->
    <line x1="36" y1="14" x2="36" y2="8" stroke="#C47C5A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="48.5" y1="17.5" x2="52.5" y2="13" stroke="#C47C5A" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="58" y1="26" x2="63" y2="22" stroke="#C47C5A" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="62" y1="38" x2="68" y2="37" stroke="#C47C5A" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="23.5" y1="17.5" x2="19.5" y2="13" stroke="#C47C5A" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="14" y1="26" x2="9" y2="22" stroke="#C47C5A" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="10" y1="38" x2="4" y2="37" stroke="#C47C5A" stroke-width="1.1" stroke-linecap="round"/>
    <!-- Sun semicircle -->
    <path d="M 24 38 A 12 12 0 0 1 48 38" stroke="#C47C5A" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- Landscape waves -->
    <path d="M 8 44 Q 22 38 36 44 Q 50 50 64 44" stroke="#C47C5A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M 8 50 Q 22 44 36 50 Q 50 56 64 50" stroke="#C47C5A" stroke-width="1.1" fill="none" stroke-linecap="round"/>
    <path d="M 8 56 Q 22 50 36 56 Q 50 62 64 56" stroke="#C47C5A" stroke-width="1.0" fill="none" stroke-linecap="round"/>
    <path d="M 12 62 Q 24 57 36 62 Q 48 67 60 62" stroke="#C47C5A" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Wordmark: COSMO SOLAR -->
  <text x="84" y="38" font-family="'Cinzel', 'Optima', Georgia, serif" font-size="20" font-weight="400" fill="#2B2F27" letter-spacing="4">COSMO SOLAR</text>
  <!-- Subtitle -->
  <text x="84" y="54" font-family="'Cinzel', 'Optima', Georgia, serif" font-size="7" font-weight="400" fill="#7A6652" letter-spacing="2.5">A COMMUNITY &amp; OPEN LABORATORY</text>
</svg>
